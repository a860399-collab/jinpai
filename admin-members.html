<script>
const CONFIG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzcfmGsqTKcnRkOnRrJgPCyATIhYTJD9gK8cteWTPUtZtu588ZjvUY-eshi5Ktde5E0/exec', // 填入 Apps Script URL
};

let allMembers = [];

async function loadData(force = false) {
  document.getElementById('loading-icon').classList.remove('hidden');
  if (!CONFIG.SCRIPT_URL) document.getElementById('config-banner').style.display = 'block';

  if (CONFIG.SCRIPT_URL) {
    try {
      const r = await fetch(CONFIG.SCRIPT_URL + '?action=getMembers&t=' + Date.now());
      const d = await r.json();
      if (d.ok) {
        allMembers = d.members;
        document.getElementById('sync-status').textContent = '✓ 已同步 ' + new Date().toLocaleTimeString('zh-TW');
      } else throw new Error(d.error);
    } catch(e) {
      allMembers = JSON.parse(localStorage.getItem('gbjyg_members') || '[]');
      document.getElementById('sync-status').textContent = '⚠ 使用本機資料';
    }
  } else {
    // 從訂單資料推導會員（如果沒有 Sheets）
    const orders = JSON.parse(localStorage.getItem('gbjyg_orders') || '[]');
    const phoneMap = {};
    orders.forEach(o => {
      const k = o.customer_phone || '';
      if (!k) return;
      if (!phoneMap[k]) phoneMap[k] = {
        id: 'M' + String(Object.keys(phoneMap).length + 1).padStart(4, '0'),
        name: o.customer_name || '',
        phone: k,
        email: o.customer_email || '',
        line_status: '未加入',
        source: o.source || '',
        referred_by: o.referral_code || '',
        total_orders: 0,
        total_spent: 0,
        marketing_consent: o.marketing_consent ? '是' : '否',
        created_at: o.created_at || '',
      };
      phoneMap[k].total_orders++;
      phoneMap[k].total_spent += Number(o.total) || 0;
    });
    allMembers = Object.values(phoneMap);
  }

  renderStats();
  renderMembers();
  document.getElementById('loading-icon').classList.add('hidden');
}
