<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單進度查詢｜金太極</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    body{font-family:'Noto Sans TC',sans-serif;background:#f8fafc}
    :root{--gold:#b45309;--herb:#2d6a4f}
    .gold-text{color:var(--gold)}
    .gold-bg{background:linear-gradient(90deg,#d4af37,#f59e0b)}
    /* 進度條 */
    .progress-track{display:flex;align-items:flex-start;justify-content:space-between;overflow-x:auto;padding-bottom:8px}
    .p-step{flex:1;text-align:center;position:relative;min-width:60px}
    .p-step::before{content:'';position:absolute;top:14px;left:-50%;width:100%;height:3px;background:#e5e7eb;z-index:0}
    .p-step:first-child::before{display:none}
    .p-step.done::before{background:var(--herb)}
    .p-step.active::before{background:linear-gradient(90deg,var(--herb),#e5e7eb)}
    .p-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:12px;font-weight:700;position:relative;z-index:1;transition:all .3s}
    .p-dot.done{background:var(--herb);color:white}
    .p-dot.active{background:#f59e0b;color:white;box-shadow:0 0 0 5px rgba(245,158,11,.2);animation:pulse 2s infinite}
    .p-dot.pending{background:#e5e7eb;color:#9ca3af}
    .p-label{font-size:11px;color:#6b7280;font-weight:500;line-height:1.3}
    .p-label.active{color:var(--gold);font-weight:700}
    .p-label.done{color:var(--herb)}
    .form-input{width:100%;border:1.5px solid #d1d5db;border-radius:12px;padding:12px 16px;font-size:15px;outline:none;transition:all .2s;background:white}
    .form-input:focus{border-color:#d4af37;box-shadow:0 0 0 3px rgba(212,175,55,.15)}
    .btn-primary{background:linear-gradient(90deg,#d4af37,#f59e0b);color:white;font-weight:900;border-radius:12px;padding:14px;width:100%;font-size:16px;cursor:pointer;transition:all .3s;border:none}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(180,83,9,.3)}
    .btn-primary:active{transform:translateY(0)}
    .btn-outline{border:2px solid #d1d5db;color:#6b7280;font-weight:700;border-radius:10px;padding:8px 20px;cursor:pointer;background:white;transition:all .2s;font-size:14px}
    .btn-outline:hover{border-color:#d4af37;color:var(--gold)}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 5px rgba(245,158,11,.2)} 50%{box-shadow:0 0 0 10px rgba(245,158,11,.05)}}
    .spinner{display:inline-block;width:20px;height:20px;border:3px solid #e5e7eb;border-top-color:#d4af37;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .info-row{display:grid;grid-template-columns:80px 1fr;gap:8px;align-items:start;font-size:14px}
  </style>
</head>
<body class="min-h-screen">

<!-- 頂部導航 -->
<nav style="background:white;border-bottom:1px solid #fde68a;padding:12px 16px">
  <div class="max-w-xl mx-auto flex justify-between items-center">
    <a href="index.html" class="font-black text-lg" style="color:#451a03;text-decoration:none">
      金牌<span style="color:#b45309">一條根</span><span class="text-xs font-normal text-slate-400 ml-2">生物科技</span>
    </a>
    <a href="index.html" class="text-sm text-slate-500 hover:text-amber-600 transition flex items-center gap-1" style="text-decoration:none">
      <i class="fas fa-arrow-left text-xs"></i> 返回首頁
    </a>
  </div>
</nav>

<div class="max-w-xl mx-auto px-4 py-10">
  <div class="text-center mb-8">
    <div class="w-16 h-16 gold-bg rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
      <i class="fas fa-search text-2xl text-white"></i>
    </div>
    <h1 class="text-2xl md:text-3xl font-black mb-2" style="color:#451a03">訂單進度查詢</h1>
    <p class="text-slate-500 text-sm">輸入訂單編號與手機末三碼，即時查詢出貨狀況</p>
  </div>

  <!-- 查詢表單 -->
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-5" id="search-form">
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1.5">
          <i class="fas fa-hashtag text-amber-500 mr-1"></i>訂單編號 <span class="text-red-500">*</span>
        </label>
        <input type="text" id="input-order" class="form-input" placeholder="例：ORDER-20241120-1234"
          onkeydown="if(event.key==='Enter')searchOrder()">
      </div>
      <div>
        <label class="block text-sm font-bold text-slate-700 mb-1.5">
          <i class="fas fa-mobile-alt text-amber-500 mr-1"></i>手機末三碼 <span class="text-red-500">*</span>
        </label>
        <input type="text" id="input-phone" class="form-input" placeholder="例：678" maxlength="3"
          onkeydown="if(event.key==='Enter')searchOrder()">
      </div>
      <button onclick="searchOrder()" id="search-btn" class="btn-primary">
        <i class="fas fa-search mr-2"></i>查詢訂單進度
      </button>
      <p id="search-error" class="text-red-500 text-sm text-center hidden"></p>
    </div>
  </div>

  <!-- 載入中 -->
  <div id="loading-area" class="hidden text-center py-10">
    <div class="spinner mx-auto mb-3"></div>
    <p class="text-slate-400 text-sm">查詢中，請稍候...</p>
  </div>

  <!-- 查詢結果 -->
  <div id="result-area" class="hidden space-y-4">

    <!-- 訂單狀態卡 -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <div class="flex justify-between items-start mb-4">
        <div>
          <p class="text-xs text-slate-400 mb-0.5">訂單編號</p>
          <p id="r-order-num" class="font-mono font-black text-base gold-text"></p>
        </div>
        <span id="r-status-badge" class="text-xs font-bold px-3 py-1.5 rounded-full"></span>
      </div>
      <div class="grid grid-cols-2 gap-3 text-sm mb-4">
        <div><p class="text-xs text-slate-400 mb-0.5">下單日期</p><p id="r-date" class="font-medium text-slate-700"></p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">付款方式</p><p class="font-medium text-slate-700">貨到付款</p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">收件人</p><p id="r-name" class="font-medium text-slate-700"></p></div>
        <div><p class="text-xs text-slate-400 mb-0.5">貨到付款金額</p><p id="r-amount" class="font-black gold-text text-lg"></p></div>
        <div class="col-span-2"><p class="text-xs text-slate-400 mb-0.5">收件地址</p><p id="r-address" class="font-medium text-slate-700"></p></div>
      </div>
    </div>

    <!-- 進度條 -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
      <h3 class="font-bold text-sm mb-5" style="color:#451a03">
        <i class="fas fa-route mr-2 text-amber-500"></i>出貨進度
      </h3>
      <div class="progress-track" id="progress-bar"></div>
      <p id="progress-desc" class="text-xs text-slate-500 mt-3 text-center"></p>
    </div>

    <!-- 物流資訊 -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5" id="logistics-section">
      <h3 class="font-bold text-sm mb-3" style="color:#451a03">
        <i class="fas fa-truck mr-2 text-amber-500"></i>物流資訊
      </h3>
      <div id="logistics-content"></div>
    </div>

    <!-- 商品明細 -->
    <div class="bg-amber-50 rounded-2xl p-5">
      <h3 class="font-bold text-sm mb-3" style="color:#451a03">
        <i class="fas fa-box mr-2 text-amber-500"></i>商品明細
      </h3>
      <div id="r-items" class="text-sm space-y-2"></div>
    </div>

    <!-- 貨到付款提醒 -->
    <div class="bg-blue-50 rounded-2xl p-4 flex items-start gap-3">
      <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center flex-shrink-0">
        <i class="fas fa-phone text-white text-sm"></i>
      </div>
      <div>
        <p class="font-bold text-sm text-blue-800 mb-1">貨到付款提醒</p>
        <p class="text-xs text-blue-600 leading-relaxed">
          商品送達時請準備好
          <strong id="r-amount-remind" class="text-blue-800"></strong>
          現金。物流員送達前會電話聯絡，請保持手機暢通，如需調整時間請來電。
        </p>
      </div>
    </div>

    <!-- 客服聯絡 -->
    <div class="bg-white rounded-2xl border border-gray-100 p-5 text-center">
      <p class="text-sm text-slate-500 mb-3">有問題嗎？立即聯繫客服</p>
      <a href="https://line.me/R/ti/p/@111wrvef" target="_blank"
        class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-sm text-white transition hover:opacity-90"
        style="background:#06c755;text-decoration:none">
        <i class="fab fa-line text-lg"></i> 加入 LINE 客服 @111wrvef
      </a>
      <p class="text-xs text-slate-400 mt-2">營業時間：週一～週六 9:00–18:00</p>
    </div>

    <div class="text-center">
      <button onclick="resetSearch()" class="btn-outline">
        <i class="fas fa-redo mr-1"></i> 查詢其他訂單
      </button>
    </div>
  </div>

  <!-- 找不到 -->
  <div id="not-found" class="hidden bg-white rounded-2xl p-10 text-center border border-gray-100 shadow-sm">
    <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-content-center mx-auto mb-4" style="display:flex;align-items:center;justify-content:center">
      <i class="fas fa-search text-2xl text-slate-300"></i>
    </div>
    <h3 class="font-bold text-slate-600 mb-2 text-lg">查無訂單資料</h3>
    <p class="text-sm text-slate-400 mb-5 leading-relaxed">
      請確認訂單編號與手機末三碼是否正確。<br>
      如有問題請聯繫客服協助查詢。
    </p>
    <div class="flex flex-col gap-3 max-w-xs mx-auto">
      <button onclick="resetSearch()" class="btn-primary text-sm py-3">重新查詢</button>
      <a href="https://line.me/R/ti/p/@111wrvef" target="_blank"
        class="block px-6 py-3 rounded-xl font-bold text-sm text-white text-center transition hover:opacity-90"
        style="background:#06c755;text-decoration:none">
        <i class="fab fa-line mr-1"></i> LINE 客服協助查詢
      </a>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG — 填入你的 Apps Script URL
// ══════════════════════════════════════════
const CONFIG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzcfmGsqTKcnRkOnRrJgPCyATIhYTJD9gK8cteWTPUtZtu588ZjvUY-eshi5Ktde5E0/exec', // 例：'https://script.google.com/macros/s/AKfycbx.../exec'
};

const statusMap = {
  '訂單成立':    { step: 0, badge: 'bg-blue-100 text-blue-700',    desc: '訂單已成立，我們正在確認中，謝謝您的耐心等候。' },
  '已通知業務部':{ step: 0, badge: 'bg-blue-100 text-blue-700',    desc: '訂單已送達業務部，正在進行確認。' },
  '業務確認':    { step: 1, badge: 'bg-yellow-100 text-yellow-700', desc: '業務已確認訂單，即將開始備貨。' },
  '業務部確認':  { step: 1, badge: 'bg-yellow-100 text-yellow-700', desc: '業務已確認訂單，即將開始備貨。' },
  '備貨中':      { step: 2, badge: 'bg-orange-100 text-orange-700', desc: '正在為您備貨，預計 1-3 個工作天出貨。' },
  '出貨中':      { step: 3, badge: 'bg-purple-100 text-purple-700', desc: '商品已出貨，正在配送途中，請保持手機暢通。' },
  '已出貨':      { step: 3, badge: 'bg-purple-100 text-purple-700', desc: '商品已出貨，請注意物流公司的配送通知。' },
  '配送中':      { step: 4, badge: 'bg-indigo-100 text-indigo-700', desc: '物流員正在配送途中，請保持手機暢通。' },
  '已送達':      { step: 5, badge: 'bg-green-100 text-green-700',   desc: '✓ 商品已送達，感謝您的購買！歡迎下次再光臨。' },
  '已收款完成':  { step: 5, badge: 'bg-green-200 text-green-800',   desc: '✓ 已收款完成，感謝您！歡迎分享給朋友。' },
  '已結案':      { step: 5, badge: 'bg-gray-100 text-gray-600',     desc: '此訂單已結案。' },
  '取消訂單':    { step: -1, badge: 'bg-red-100 text-red-600',      desc: '此訂單已取消。如有疑問請聯繫客服。' },
};
const steps = [
  { label: '訂單成立', icon: 'fa-file-alt' },
  { label: '業務確認', icon: 'fa-check-circle' },
  { label: '備貨中',   icon: 'fa-box' },
  { label: '已出貨',   icon: 'fa-shipping-fast' },
  { label: '配送中',   icon: 'fa-truck' },
  { label: '已送達',   icon: 'fa-home' },
];

// 從 URL 參數自動帶入
window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(location.search);
  if (p.get('order')) document.getElementById('input-order').value = p.get('order');
  if (p.get('phone')) document.getElementById('input-phone').value = p.get('phone');
p.get('phone') && p.get('order')) searchOrder();
});

async function searchOrder() {
  const orderNum = document.getElementById('input-order').value.trim().toUpperCase();
  const phone3   = document.getElementById('input-phone').value.trim();
  if (!orderNum || phone3.length !== 3) {
    alert('請輸入訂單編號與手機末3碼');
    return;
  }
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 查詢中...';
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('not-found').classList.add('hidden');
  document.getElementById('loading-area').classList.remove('hidden');

  let order = null;

  // 1. 先查 Google Sheet（Apps Script）
  if (CONFIG.SCRIPT_URL) {
    try {
      const url = `${CONFIG.SCRIPT_URL}?action=getorder&orderNum=${encodeURIComponent(orderNum)}&phone=${encodeURIComponent(phone3)}`;
      const res = await fetch(url);
      const json = await res.json();
      if (json.ok && json.order) order = json.order;
    } catch(e) {}
  }

  // 2. fallback：查 localStorage
  if (!order) {
    const local = JSON.parse(localStorage.getItem('gbjyg_orders') || '[]');
    const found = local.find(o =>
      o.order_number === orderNum &&
      String(o.customer_phone || '').slice(-3) === phone3
    );
    if (found) order = found;
  }

  btn.disabled = false;
  btn.innerHTML = '<i class="fas fa-search mr-2"></i>查詢訂單進度';
  document.getElementById('loading-area').classList.add('hidden');

  if (!order) {
    document.getElementById('not-found').classList.remove('hidden');
    return;
  }
  renderResult(order);
}

function renderResult(o) {
  const statusInfo = statusMap[o.order_status] || { step: 0, badge: 'bg-gray-100 text-gray-600', desc: '處理中' };
  const currentStep = statusInfo.step;

  // 進度條（id=progress-bar）
  const track = document.getElementById('progress-bar');
  track.innerHTML = steps.map((s, i) => {
    let cls = 'pending';
    if (currentStep < 0) cls = 'pending';
    else if (i < currentStep) cls = 'done';
    else if (i === currentStep) cls = 'active';
    return `<div class="p-step ${cls === 'done' ? 'done' : cls === 'active' ? 'active' : ''}">
      <div class="p-dot ${cls}"><i class="fas ${s.icon} text-xs"></i></div>
      <div class="p-label ${cls === 'active' ? 'active' : cls === 'done' ? 'done' : ''}">${s.label}</div>
    </div>`;
  }).join('');

  // 狀態 badge + 描述（id=progress-desc）
  document.getElementById('r-status-badge').className = `text-xs font-bold px-3 py-1.5 rounded-full ${statusInfo.badge}`;
  document.getElementById('r-status-badge').textContent = o.order_status || '訂單成立';
  document.getElementById('progress-desc').textContent = statusInfo.desc;

  // 訂單資訊
  document.getElementById('r-order-num').textContent = o.order_number || '—';
  document.getElementById('r-date').textContent      = o.created_at ? o.created_at.slice(0,10) : '—';
  document.getElementById('r-amount').textContent    = o.total ? 'NT$ ' + Number(o.total).toLocaleString() : '—';
  document.getElementById('r-name').textContent      = o.customer_name || '—';
  document.getElementById('r-address').textContent   = o.shipping_address || '—';

  // 商品明細（id=r-items）
  document.getElementById('r-items').innerHTML =
    `<div class="flex justify-between"><span class="text-slate-600">${o.product || '商品'}</span><span class="font-bold">${o.quantity || 1} 罐</span></div>
     <div class="flex justify-between text-slate-500 text-xs"><span>貨到付款總金額</span><span class="font-black gold-text text-base">NT$ ${Number(o.total||0).toLocaleString()}</span></div>`;

  // 物流資訊（id=logistics-section, logistics-content）
  const logisticsSection = document.getElementById('logistics-section');
  if (o.logistics_company || o.tracking_number || o.shipped_at) {
    logisticsSection.classList.remove('hidden');
    document.getElementById('logistics-content').innerHTML =
      `<div class="grid grid-cols-2 gap-2 text-sm">
        <div><p class="text-xs text-slate-400">物流公司</p><p class="font-bold">${o.logistics_company || '—'}</p></div>
        <div><p class="text-xs text-slate-400">物流單號</p><p class="font-bold font-mono">${o.tracking_number || '—'}</p></div>
        <div><p class="text-xs text-slate-400">出貨日期</p><p class="font-bold">${o.shipped_at || '—'}</p></div>
      </div>`;
  } else {
    logisticsSection.classList.add('hidden');
  }

  // 貨到付款提醒
  document.getElementById('r-amount-remind').textContent =
    o.total ? 'NT$ ' + Number(o.total).toLocaleString() : '';

  document.getElementById('result-area').classList.remove('hidden');
  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetSearch() {
  document.getElementById('input-order').value = '';
  document.getElementById('input-phone').value = '';
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('not-found').classList.add('hidden');
  document.getElementById('input-order').focus();
}
</script>
</body>
</html>
