<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>員工業績查詢｜金牌一條根</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    body{font-family:'Noto Sans TC',sans-serif;background:#f8fafc}
    :root{--gold:#b45309;--herb:#2d6a4f}
    .gold-text{color:var(--gold)}
    .gold-bg{background:linear-gradient(90deg,#d4af37,#f59e0b)}
    .herb-bg{background:var(--herb)}
    .form-input{width:100%;border:1.5px solid #d1d5db;border-radius:12px;padding:12px 16px;font-size:18px;outline:none;transition:all .2s;background:white;text-align:center;letter-spacing:6px;font-weight:900}
    .form-input:focus{border-color:#d4af37;box-shadow:0 0 0 3px rgba(212,175,55,.15)}
    .btn-primary{background:linear-gradient(90deg,#d4af37,#f59e0b);color:white;font-weight:900;border-radius:12px;padding:14px;width:100%;font-size:16px;cursor:pointer;border:none;transition:all .3s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(180,83,9,.3)}
    .stat-card{background:white;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid #f3f4f6}
    .spinner{display:inline-block;width:24px;height:24px;border:3px solid #e5e7eb;border-top-color:#d4af37;border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .status-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700}
    .badge-pending{background:#fef9c3;color:#854d0e}
    .badge-shipping{background:#f3e8ff;color:#7e22ce}
    .badge-done{background:#dcfce7;color:#14532d}
    .badge-cancel{background:#fee2e2;color:#991b1b}
    .badge-default{background:#f1f5f9;color:#475569}
  </style>
</head>
<body class="min-h-screen">

<nav style="background:white;border-bottom:1px solid #fde68a;padding:12px 16px">
  <div class="max-w-xl mx-auto flex justify-between items-center">
    <span class="font-black text-lg" style="color:#451a03">金牌<span style="color:#b45309">一條根</span><span class="text-xs font-normal text-slate-400 ml-2">員工業績</span></span>
    <a href="index.html" class="text-sm text-slate-500 hover:text-amber-600 transition" style="text-decoration:none"><i class="fas fa-arrow-left text-xs mr-1"></i>返回首頁</a>
  </div>
</nav>

<div class="max-w-xl mx-auto px-4 py-10">

  <!-- 登入區 -->
  <div id="login-section">
    <div class="text-center mb-8">
      <div class="w-16 h-16 gold-bg rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
        <i class="fas fa-chart-bar text-2xl text-white"></i>
      </div>
      <h1 class="text-2xl font-black mb-2" style="color:#451a03">員工業績查詢</h1>
      <p class="text-slate-500 text-sm">請輸入您的推薦碼查詢個人業績</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
      <label class="block text-sm font-bold text-slate-700 mb-3 text-center">
        <i class="fas fa-key text-amber-500 mr-1"></i>推薦碼
      </label>
      <input type="text" id="input-code" class="form-input mb-4" placeholder="例：1688"
        maxlength="10" oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')login()">
      <button onclick="login()" class="btn-primary">
        <i class="fas fa-sign-in-alt mr-2"></i>查詢我的業績
      </button>
      <p id="login-error" class="text-red-500 text-sm text-center mt-3 hidden"></p>
    </div>
  </div>

  <!-- 載入中 -->
  <div id="loading-section" class="hidden text-center py-16">
    <div class="spinner mx-auto mb-4"></div>
    <p class="text-slate-400">載入業績資料中...</p>
  </div>

  <!-- 業績看板 -->
  <div id="dashboard-section" class="hidden space-y-5">

    <!-- 員工資訊 -->
    <div class="gold-bg rounded-2xl p-5 text-white">
      <div class="flex justify-between items-center">
        <div>
          <p class="text-xs opacity-80 mb-1">推薦碼</p>
          <p id="d-code" class="text-2xl font-black tracking-widest"></p>
        </div>
        <div class="text-right">
          <p class="text-xs opacity-80 mb-1">查詢時間</p>
          <p id="d-time" class="text-sm font-bold"></p>
        </div>
      </div>
    </div>

    <!-- 統計卡片 -->
    <div class="grid grid-cols-2 gap-3">
      <div class="stat-card text-center">
        <p class="text-xs text-slate-400 mb-1">總訂單數</p>
        <p id="d-total-orders" class="text-3xl font-black gold-text">0</p>
        <p class="text-xs text-slate-400 mt-1">筆</p>
      </div>
      <div class="stat-card text-center">
        <p class="text-xs text-slate-400 mb-1">累計業績</p>
        <p id="d-total-amount" class="text-2xl font-black" style="color:#2d6a4f">$0</p>
        <p class="text-xs text-slate-400 mt-1">NT$</p>
      </div>
      <div class="stat-card text-center">
        <p class="text-xs text-slate-400 mb-1">待出貨</p>
        <p id="d-pending" class="text-2xl font-black text-orange-500">0</p>
        <p class="text-xs text-slate-400 mt-1">筆</p>
      </div>
      <div class="stat-card text-center">
        <p class="text-xs text-slate-400 mb-1">已完成</p>
        <p id="d-completed" class="text-2xl font-black text-green-600">0</p>
        <p class="text-xs text-slate-400 mt-1">筆</p>
      </div>
    </div>

    <!-- 本月業績 -->
    <div class="stat-card">
      <div class="flex justify-between items-center">
        <div>
          <p class="text-xs text-slate-400 mb-1"><i class="fas fa-calendar text-amber-500 mr-1"></i>本月訂單</p>
          <p id="d-month-orders" class="text-xl font-black gold-text">0 筆</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-slate-400 mb-1">本月業績</p>
          <p id="d-month-amount" class="text-xl font-black" style="color:#2d6a4f">$0</p>
        </div>
      </div>
    </div>

    <!-- 訂單明細 -->
    <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center">
        <h3 class="font-bold text-sm" style="color:#451a03"><i class="fas fa-list text-amber-500 mr-2"></i>訂單明細</h3>
        <span id="d-order-count" class="text-xs text-slate-400"></span>
      </div>
      <div id="d-orders-list" class="divide-y divide-gray-50 max-h-96 overflow-y-auto"></div>
      <div id="d-no-orders" class="hidden text-center py-8 text-slate-400 text-sm">
        <i class="fas fa-inbox text-2xl mb-2 block"></i>目前尚無訂單
      </div>
    </div>

    <!-- 登出 -->
    <button onclick="logout()" class="w-full py-3 rounded-xl font-bold text-slate-500 border border-gray-200 bg-white hover:border-amber-300 hover:text-amber-600 transition text-sm">
      <i class="fas fa-sign-out-alt mr-2"></i>切換帳號
    </button>
  </div>

</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzcfmGsqTKcnRkOnRrJgPCyATIhYTJD9gK8cteWTPUtZtu588ZjvUY-eshi5Ktde5E0/exec';
const VALID_CODES = ['1688','2588','5208','6688','JIN1000'];

const statusBadge = {
  '訂單成立': 'badge-pending', '業務確認': 'badge-pending',
  '備貨中': 'badge-pending', '出貨中': 'badge-shipping',
  '已出貨': 'badge-shipping', '配送中': 'badge-shipping',
  '已送達': 'badge-done', '已收款完成': 'badge-done',
  '取消訂單': 'badge-cancel',
};

async function login() {
  const code = document.getElementById('input-code').value.trim().toUpperCase();
  const errEl = document.getElementById('login-error');
  if (!code) { showError('請輸入推薦碼'); return; }
  if (!VALID_CODES.includes(code)) { showError('推薦碼不正確，請向管理員確認'); return; }

  document.getElementById('login-section').classList.add('hidden');
  document.getElementById('loading-section').classList.remove('hidden');

  try {
    const res = await fetch(`${SCRIPT_URL}?action=getemployeestats&code=${encodeURIComponent(code)}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || '查詢失敗');
    renderDashboard(data);
  } catch(e) {
    document.getElementById('loading-section').classList.add('hidden');
    document.getElementById('login-section').classList.remove('hidden');
    showError('查詢失敗：' + e.message);
  }
}

function renderDashboard(data) {
  document.getElementById('loading-section').classList.add('hidden');

  document.getElementById('d-code').textContent = data.referral_code;
  document.getElementById('d-time').textContent = new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei'});
  document.getElementById('d-total-orders').textContent = data.total_orders;
  document.getElementById('d-total-amount').textContent = '$' + Number(data.total_amount).toLocaleString();
  document.getElementById('d-pending').textContent = data.pending_orders;
  document.getElementById('d-completed').textContent = data.completed_orders;

  // 本月統計
  const monthStr = new Date().toISOString().slice(0,7);
  const monthOrders = (data.orders || []).filter(o => String(o.created_at).startsWith(monthStr));
  const monthAmount = monthOrders.reduce((a,o) => a + (Number(o.total)||0), 0);
  document.getElementById('d-month-orders').textContent = monthOrders.length + ' 筆';
  document.getElementById('d-month-amount').textContent = '$' + monthAmount.toLocaleString();

  // 訂單明細
  const orders = data.orders || [];
  const listEl = document.getElementById('d-orders-list');
  document.getElementById('d-order-count').textContent = `共 ${orders.length} 筆`;

  if (orders.length === 0) {
    document.getElementById('d-no-orders').classList.remove('hidden');
  } else {
    listEl.innerHTML = orders.map(o => `
      <div class="px-5 py-3 hover:bg-amber-50 transition">
        <div class="flex justify-between items-start">
          <div class="flex-1">
            <p class="font-mono text-xs text-slate-400">${o.order_number || '—'}</p>
            <p class="text-sm font-bold text-slate-700 mt-0.5">${o.product || '商品'} × ${o.quantity || 1}</p>
            <p class="text-xs text-slate-400 mt-0.5">${String(o.created_at||'').slice(0,10)}</p>
          </div>
          <div class="text-right ml-3">
            <p class="font-black gold-text">$${Number(o.total||0).toLocaleString()}</p>
            <span class="status-badge ${statusBadge[o.order_status] || 'badge-default'} mt-1 block">${o.order_status || '—'}</span>
          </div>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('dashboard-section').classList.remove('hidden');
}

function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}

function logout() {
  document.getElementById('dashboard-section').classList.add('hidden');
  document.getElementById('login-section').classList.remove('hidden');
  document.getElementById('input-code').value = '';
  document.getElementById('login-error').classList.add('hidden');
  document.getElementById('d-orders-list').innerHTML = '';
}
</script>
</body>
</html>
