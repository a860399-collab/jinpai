<!DOCTYPE html>
<html lang="zh-TW">
<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
    body{font-family:'Noto Sans TC',sans-serif;background:#0f172a;color:#e2e8f0}
    .sidebar{width:224px;flex-shrink:0;min-height:100vh}
    .nav-link{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:8px;color:#94a3b8;font-size:13px;transition:all .2s;text-decoration:none}

    .metric-card{background:#1e293b;border-radius:12px;border:1px solid #334155;padding:16px 20px}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid #334155;border-top-color:#d4af37;border-radius:50%;animation:spin .7s linear infinite}

    .bar{height:8px;border-radius:4px;transition:width .5s ease}
  </style>

<body class="min-h-screen">

</div>

  <div class="sidebar bg-slate-900 border-r border-slate-800 p-4 flex flex-col gap-1 sticky top-0 h-screen overflow-y-auto">
    <div class="mb-6 px-2">
      <p class="text-xs text-slate-500 mb-0.5">ADMIN PANEL</p>
      <h1 class="font-black text-white text-sm leading-tight">金牌一條根<br><span class="text-amber-400">生物科技</span></h1>
    </div>
    <a href="admin-dashboard.html" class="nav-link active"><i class="fas fa-chart-bar w-4 text-center"></i> 總覽</a>
    <a href="admin-orders.html" class="nav-link"><i class="fas fa-box w-4 text-center"></i> 訂單管理</a>
    <a href="admin-members.html" class="nav-link"><i class="fas fa-users w-4 text-center"></i> 會員名冊</a>
    <div class="my-2 border-t border-slate-800"></div>
    <a href="order-tracking.html" target="_blank" class="nav-link text-slate-500"><i class="fas fa-search w-4 text-center"></i> 客戶查詢頁 ↗</a>
    <a href="index.html" target="_blank" class="nav-link text-slate-500"><i class="fas fa-home w-4 text-center"></i> 前台首頁 ↗</a>
    <div class="mt-auto pt-4 border-t border-slate-800">
      <div id="sync-status" class="text-xs text-slate-500 px-2"></div>
    </div>
  </div>

  <div class="flex-1 p-6 overflow-auto">
    <!-- 標題 -->
    <div class="flex justify-between items-center mb-6">

        <h2 class="text-xl font-black text-white">Dashboard 總覽</h2>

        <p class="text-sm font-bold text-emerald-400" id="m-today-amount">—</p>
      </div>
      <div class="metric-card">
        <p class="text-xs text-slate-400 mb-1 flex items-center gap-1"><i class="fas fa-calendar text-blue-400"></i> 本月訂單</p>
        <p class="text-3xl font-black text-blue-400" id="m-month-orders">—</p>
        <p class="text-xs text-slate-500 mt-1">本月成交</p>
        <p class="text-sm font-bold text-blue-400" id="m-month-amount">—</p>
      </div>
      <div class="metric-card">
        <p class="text-xs text-slate-400 mb-1 flex items-center gap-1"><i class="fas fa-clock text-yellow-400"></i> 待處理</p>

        <p class="text-xs text-slate-500 mt-1">需要關注的訂單</p>

      <div class="metric-card">
        <p class="text-xs text-slate-400 mb-1 flex items-center gap-1"><i class="fas fa-users" style="color:#c084fc"></i> 會員</p>
        <p class="text-3xl font-black" style="color:#c084fc" id="m-members">—</p>
        <p class="text-xs text-slate-500 mt-1">LINE 已加入</p>
        <p class="text-sm font-bold" style="color:#c084fc" id="m-line">—</p>

    <div class="grid md:grid-cols-2 gap-4 mb-4">

      </div>

      <!-- 來源分布 -->
      <div class="card">
        <h3 class="font-bold text-sm text-white mb-4 flex items-center gap-2">
          <i class="fas fa-filter text-blue-400"></i> 來源平台分布
        </h3>
        <div class="space-y-2.5" id="source-breakdown">
          <div class="text-slate-500 text-xs">載入中...</div>

    <!-- 最新訂單 -->

        <table class="w-full text-xs">

              <th class="text-left pb-2 pr-4">客戶</th>
              <th class="text-left pb-2 pr-4">商品</th>

              <th class="text-left pb-2">日期</th>
            </tr>

        </table>

    <!-- 員工優惠碼績效 -->
    <div class="card">
      <h3 class="font-bold text-sm text-white mb-4 flex items-center gap-2">
        <i class="fas fa-ticket-alt text-yellow-400"></i> 員工優惠碼績效
      </h3>
      <div class="space-y-3" id="coupon-stats">
        <div class="text-slate-500 text-xs">載入中...</div>
      </div>

<script>
const CONFIG = {
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbzcfmGsqTKcnRkOnRrJgPCyATIhYTJD9gK8cteWTPUtZtu588ZjvUY-eshi5Ktde5E0/exec', // 填入 Apps Script URL
};
const STATUS_COLORS = {
  '訂單成立':'text-blue-400','已通知業務部':'text-blue-400','業務部確認':'text-yellow-400',
  '備貨中':'text-orange-400','已出貨':'text-purple-400','配送中':'text-indigo-400',
  '已送達':'text-green-400','已結案':'text-slate-400','取消訂單':'text-red-400',
};

document.getElementById('now-time').textContent = new Date().toLocaleString('zh-TW');

async function loadAll(force = false) {
  document.getElementById('loading-icon').classList.remove('hidden');
  if (!CONFIG.SCRIPT_URL) document.getElementById('config-banner').style.display = 'block';

  let orders = [], members = [];
  if (CONFIG.SCRIPT_URL) {
    try {
      const [r1, r2] = await Promise.all([
        fetch(CONFIG.SCRIPT_URL + '?action=getOrders&t=' + Date.now()),
        fetch(CONFIG.SCRIPT_URL + '?action=getMembers&t=' + Date.now()),
      ]);
      const d1 = await r1.json(), d2 = await r2.json();
      orders  = d1.ok ? d1.orders  : [];
      members = d2.ok ? d2.members : [];
      document.getElementById('sync-status').textContent = '✓ 已同步 ' + new Date().toLocaleTimeString('zh-TW');
    } catch(e) {
      orders  = JSON.parse(localStorage.getItem('gbjyg_orders')  || '[]');
      members = JSON.parse(localStorage.getItem('gbjyg_members') || '[]');
      document.getElementById('sync-status').textContent = '⚠ 使用本機資料';
    }
  } else {
    orders  = JSON.parse(localStorage.getItem('gbjyg_orders')  || '[]');
    members = JSON.parse(localStorage.getItem('gbjyg_members') || '[]');
  }

  renderDashboard(orders, members);
  document.getElementById('loading-icon').classList.add('hidden');
}

function renderDashboard(orders, members) {
  const today  = new Date().toISOString().slice(0, 10);
  const monthP = new Date().toISOString().slice(0, 7);
  const todayO = orders.filter(o => (o.created_at || '').startsWith(today));
  const monthO = orders.filter(o => (o.created_at || '').startsWith(monthP));
  const pending = orders.filter(o => ['訂單成立','已通知業務部','業務部確認','備貨中'].includes(o.order_status));

  document.getElementById('m-today-orders').textContent  = todayO.length;
  document.getElementById('m-today-amount').textContent  = '$' + todayO.reduce((a, o) => a + (Number(o.total) || 0), 0).toLocaleString();
  document.getElementById('m-month-orders').textContent  = monthO.length;
  document.getElementById('m-month-amount').textContent  = '$' + monthO.reduce((a, o) => a + (Number(o.total) || 0), 0).toLocaleString();
  document.getElementById('m-pending').textContent       = pending.length;
  document.getElementById('m-members').textContent
